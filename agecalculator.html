<!DOCTYPE html>
<html>
<head>
<title>Age Calculator</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input{
    padding:10px;
    margin-top:10px;
}

button{
    padding:10px 20px;
    margin-top:15px;
    background:#4facfe;
    border:none;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0077ff;
}

#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Age Calculator</h1>

<label>Enter Your Date of Birth</label>

<input type="date" id="dob">

<button onclick="calculateAge()">Calculate Age</button>

<p id="result"></p>

</div>

<script src="script.js"></script>

</body>
</html>
